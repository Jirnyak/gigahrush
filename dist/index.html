ко","Руденко","Савченко"],Xf=["Дима","Серый","Толик","Лёха","Колян","Жека","Саня","Вован","Макс","Костыль","Шурик","Борян"],Yf=["Машка","Светка","Ленка","Танька","Наташка","Иришка","Зинка","Верка","Нинка","Анька"],zf=["Бетон","Шило","Гвоздь","Крыса","Дым","Штырь","Башка","Кирпич","Резак","Гайка","Труба","Ржавый","Шакал","Метла","Кабан","Цемент","Молот","Арматура","Пыль","Болт"],Vf=["Чёрн","Кровав","Безглаз","Гнил","Тёмн","Слеп","Пепельн","Утопш","Безмолвн","Полз","Бетонн","Серебрян","Пустотн","Могильн","Хтоничн"],qf=["Идол","Коготь","Скрежет","Червь","Столп","Глаз","Рот","Клык","Зов","Дым","Прах","Камень","Шёпот","Голод"],Zf=["Гниль","Тень","Плоть","Яма","Пасть","Бездна","Жила","Завеса","Мгла","Тишь","Язва","Пелена","Дыра"];function Ee(t){return t[Math.floor(Math.random()*t.length)]}function Ze(t){switch(t){case Z.LIQUIDATOR:{const e=Ee($f),o=Ee(Kf);return{name:`${e} ${o}`,female:!1}}case Z.WILD:{const e=Math.random()<.35,o=Ee(e?Yf:Xf),n=Ee(zf);return{name:`${o} «${n}»`,female:e}}case Z.CULTIST:{const e=Math.random()<.5,o=Ee(Vf),n=o.slice(-1),a=e?"ая":"жшчщц".includes(n)?"ий":"ый",s=Ee(e?Zf:qf);return{name:`${o}${a} ${s}`,female:e}}default:{const e=Math.random()<.5,o=Ee(e?Uf:wf),n=Ee(Gf);return{name:`${o} ${n}${e?"а":""}`,female:e}}}}function ht(){return{food:70+Math.random()*30,water:70+Math.random()*30,sleep:60+Math.random()*40,pee:Math.random()*30,poo:Math.random()*20}}const Tr=["Стены дышат. Я слышу как бетон стонет ночью.","Не ходите в коридоры после самосбора. Они голодны.","Дверь закрыта. Ключ проглочен стеной. Мы заперты.","Этажей нет. Есть только бесконечный лабиринт из комнат.","Я видел свою квартиру в другом конце. Там жил кто-то другой. С МОИМ лицом.","Бетонник не атакует если не двигаться. Наврали. Он просто медленный.","Запас еды тает. Кухня перестроилась. Консервы вросли в стену.","Самосбор — не землетрясение. Это ХРУЩ переваривает сам себя.","Они выходят из стен. Буквально. Бетон расступается и закрывается за ними.","Мой сосед ушёл за водой два самосбора назад. Коридор, по которому он шёл, больше не существует.","Если слышишь скрежет — беги в комнату и закрой дверь. Герметично.","Мы считали этажи. Их нет. Только тор. Бесконечный серый тор.","Кто-то нашёл выход. Вернулся через стену с другой стороны.","Записка: «НЕ СПАТЬ В КОРИДОРАХ»","Ползун не видит. Он чувствует вибрации. Замри."],ro={olga:{name:"Ольга Дмитриевна",isFemale:!0,faction:Z.SCIENTIST,occupation:K.DOCTOR,sprite:K.DOCTOR,hp:500,maxHp:500,money:50,speed:1.2,inventory:[{defId:"bandage",count:3},{defId:"pills",count:1},{defId:"water",count:2},{defId:"bread",count:2}],talkLines:["Добро пожаловать в блок! Я Ольга Дмитриевна, врач. Прочитайте слайды на стене — там основные правила.","Двигайтесь клавишами WASD, мышь — обзор. Нажмите E чтобы поговорить с кем-нибудь или открыть дверь.","Предметы подбираются автоматически. I — открыть инвентарь. F — отношения фракций. Кушайте вовремя, иначе здоровье падает.","Пробел или ЛКМ — удар/выстрел. Зайдите в оружейную — там Барни покажет как стрелять.","Когда услышите сирену — это САМОСБОР. Бегите в ближайшую комнату и закройте дверь! Коридоры смертельно опасны.","Фиолетовый туман убивает. Из него лезут твари. Не стойте в тумане — бегите к шлюзу.","Нажмите M — карта. Q — журнал заданий. Общайтесь с жителями, помогайте — от них зависит выживание.","У меня есть для вас задание. Откройте вкладку «Задание» — я расскажу."],talkLinesPost:["Приходи если ранен. Помогу.","Таблеток мало осталось.","Мне пора на работу. Береги себя."]},barni:{name:"Барни",isFemale:!1,faction:Z.LIQUIDATOR,occupation:K.HUNTER,sprite:K.HUNTER,hp:600,maxHp:600,money:80,speed:1.4,inventory:[{defId:"makarov",count:1},{defId:"ammo_9mm",count:8},{defId:"canned",count:1}],talkLines:["Я Барни, старший ликвидатор. Добро пожаловать в оружейную.","Стреляй по мишеням — тренируйся. Патроны забирай со стойки.","Макаров — лучший друг в лабиринте. Держи его заряженным.","Слышишь сирену — хватай ствол и к двери. В коридоре без оружия — труп.","Мишени на стене — стреляй сколько хочешь. Следы от пуль видно.","Бетонник? Не лезь с ножом. Только с огнестрелом. И то — издалека."],talkLinesPost:[]},yakov:{name:"Яков Давидович",isFemale:!1,faction:Z.SCIENTIST,occupation:K.SCIENTIST,sprite:K.SCIENTIST,hp:400,maxHp:400,money:60,speed:1,inventory:[{defId:"psi_strike",count:1},{defId:"antidep",count:1}],talkLines:[],talkLinesPost:["Исследования продолжаются. Не мешай.","Самосбор и культы — тут есть связь. Я чувствую это.","Возвращайся, если найдёшь что-то необычное."],talkQuestResponse:"Ольга прислала? Хорошо. Я занимаюсь пси-явлениями хруща. Возьмите это — пригодится."},vanka:{name:"Ванька Банчиный",isFemale:!1,faction:Z.CULTIST,occupation:K.ALCOHOLIC,sprite:K.ALCOHOLIC,hp:300,maxHp:300,money:5,speed:.9,inventory:[{defId:"bread",count:1},{defId:"cigs",count:2}],talkLines:["А?! Кто?! Не трогай! Ванька не виноват! Ванька ничего не делал!","Чернобог… Чернобог идёт… ОН ВСЕГДА ИДЁТ… стены дышат, слышишь?","Теневик! Теневик он злой! Петля! Плохой человек! Приказал страшно!","Тени ползут… из стен… из пола… Теневик командует ими… он не человек уже…","Ванька видел! Ванька всё видел! Глаза в темноте! Фиолетовые!","Убей его! УБЕЙ ТЕНЕВИКА! Тогда Ванька спать сможет… может быть…"],talkLinesPost:["Тише стало… но стены всё ещё дышат…","Ванька боится. Всегда боится.","Спасибо тебе… Теневик больше не приходит во снах…"],talkQuestResponse:"Яков? Яков послал?! Учёный… Ванька расскажет! Теневик! Он злой! Петля! Плохой человек! Приказал страшно! Убей его! УБЕЙ!"},major_grom:{name:"Майор Громный",isFemale:!1,faction:Z.LIQUIDATOR,occupation:K.HUNTER,sprite:K.HUNTER,hp:1e4,maxHp:1e4,money:120,speed:1.5,inventory:[{defId:"makarov",count:1},{defId:"ammo_9mm",count:12},{defId:"canned",count:2},{defId:"bandage",count:2}],talkLines:["Майор Громный, ликвидатор. Осваиваем этот блок — трубы, крысы, твари.","Наверху полегче. Тут — каждый коридор может быть последним.","Если Яков послал — значит дело серьёзное. Слушаю.","Теневики? Видали. Гадость. Но у нас тут проблемы й! Убей его! УБЕЙ ТЕНЕВИКА! Тогда Ванька спать сможет!»",targetMonsterKind:H.SHADOW,killNeeded:1,rewardItem:"psi_recall",rewardCount:1,relationDelta:20,xpReward:60},{giverNpcId:"vanka",type:ft.FETCH,desc:"С теневика вы подобрали странный сгусток. Ванька: «Неси это учёному! Яков поймёт! ОН ПОЙМЁТ!»",targetItem:"strange_clot",targetCount:1,rewardItem:"bandage",rewardCount:3,extraRewards:[{defId:"pills",count:1}],relationDelta:15,xpReward:40},{giverNpcId:"yakov",type:ft.TALK,desc:"Яков Давидович: «Теневик — что-то новое. О них слышали в докладах с нижних уровней. Спустись в коллекторы и найди моего знакомого — Майора Громного. Его форпост должен быть где-то под стрельбищем и моей лабораторией, на уровень ниже. Поищи ближайший лифт.»",targetNpcId:"major_grom",rewardItem:"psi_rupture",rewardCount:1,relationDelta:20,xpReward:60,moneyReward:80},{giverNpcId:"major_grom",type:ft.KILL,desc:"Майор Громный: «Помоги отбиться — тварей тут полно. Убей хотя бы десять, и я расскажу что знаю о теневиках.»",killNeeded:10,rewardItem:"ak47",rewardCount:1,extraRewards:[{defId:"ammo_762",count:30}],relationDelta:25,xpReward:80,moneyReward:100,spawnMonstersOnAccept:8},{giverNpcId:"major_grom",type:ft.KILL,desc:"Майор Громный: «Отлично, мы укрепили наши позиции. Пора контратаковать. Наши детекторы засекли особые вибрации {dir} — судя по всему, тварями кто-то управляет. Уничтожь эту тварь.»",targetMonsterKind:H.MANCOBUS,killNeeded:1,rewardItem:"psi_storm",rewardCount:1,extraRewards:[{defId:"bandage",count:5},{defId:"ammo_762",count:30}],relationDelta:30,xpReward:150,moneyReward:200},{giverNpcId:"major_grom",type:ft.VISIT,desc:"Майор Громный: «Ты молодец — в одиночку завалил Манкобуса. Ну что ж, сейчас или никогда. Отправляйся на нижний уровень и узнай, что там творится. Лифт ведёт вниз.»",targetRoomType:void 0,rewardItem:"bandage",rewardCount:5,extraRewards:[{defId:"antidep",count:2}],relationDelta:20,xpReward:100,visitFloor:ot.HELL}],ls=[];function Ft(t,e,o){ro[t]=e,ls.push(...o)}function p                          : vec3(5.0/255.0, 5.0/255.0, 8.0/255.0);
}

vec3 applyFogV(vec3 c, float f) {
  vec3 fc = fogColor();
  return mix(c, fc, f);
}

float flashlightBoost(float dist) {
  if (uFlashlight <= 0.0) return 0.0;
  float radius = 8.5;
  if (dist >= radius) return 0.0;
  float t = 1.0 - dist / radius;
  return uFlashlight * t * t * 0.95;
}

// Hash noise for hell eye overlay (matches pixutil.noise on CPU)
float noiseI(int x, int y, int s) {
  int n = x * 374761393 + y * 668265263 + s * 1274126177;
  n = (n ^ (n >> 13)) * 1103515245;
  n = n ^ (n >> 16);
  return float(n & 0x7fff) / 32767.0;
}

float clampSigned(float v, float lim) {
  return clamp(v, -lim, lim);
}

float toroidalDelta(float a, float b) {
  float d = b - a;
  if (d > float(W_SIZE) * 0.5) d -= float(W_SIZE);
  if (d < -float(W_SIZE) * 0.5) d += float(W_SIZE);
  return d;
}

vec3 applyHellEye(vec3 base, int texXi, int texYi, int cellX, int cellY) {
  float marker = noiseI(cellX, cellY, 901);
  if (marker < 0.84) return base;

  int eyeCount = marker > 0.97 ? 3 : (marker > 0.915 ? 2 : 1);
  float blinkSpeed = 0.25 + noiseI(cellX, cellY, 902) * 0.9;
  float cycle = fract(uTime * blinkSpeed + noiseI(cellX, cellY, 903) * 5.0);
  float eyelid = cycle < 0.16 ? max(0.04, abs(cycle - 0.08) / 0.08) : 1.0;
  float toPlayerX = toroidalDelta(float(cellX) + 0.5, uPos.x);
  float toPlayerY = toroidalDelta(float(cellY) + 0.5, uPos.y);
  float playerDist = sqrt(toPlayerX * toPlayerX + toPlayerY * toPlayerY);
  float track = playerDist < 7.5 ? (1.0 - playerDist / 7.5) : 0.0;

  float tx = float(texXi);
  float ty = float(texYi);
  vec3 color = base;

  for (int ei = 0; ei < 3; ei++) {
    if (ei >= eyeCount) break;
    float ox = 12.0 + noiseI(cellX + ei * 17, cellY, 904) * 40.0;
    float oy = 14.0 + noiseI(cellX, cellY + ei * 23, 905) * 36.0;
    float rx = 6.0 + noiseI(cellX + ei * 31, cellY, 906) * 7.0;
    float ry = max(1.2, rx * (0.12 + eyelid * 0.42));
    float dx = tx - ox;
    float dy = ty - oy;
    float norm = (dx * dx) / (rx * rx) + (dy * dy) / (ry * ry);

    color = mix(color, vec3(230.0/255.0, 216.0/255.0, 182.0/255.0), 0.78);

    float idleShiftX = (noiseI(cellX, cellY, 907 + ei) - 0.5) * 1.4;
    float idleShiftY = (noiseI(cellX, cellY, 909 + ei) - 0.5) * 1.1;
    float irisShiftX = idleShiftX + clampSigned(toPlayerX * 0.55 * track, rx * 0.24);
    float irisShiftY = idleShiftY + clampSigned(toPlayerY * 0.55 * track, ry * 0.28);
    float irisR = rx * 0.42;
    float pupilR = rx * 0.18;
    float ix = tx - (ox + irisShiftX);
    float iy = ty - (oy + irisShiftY);
    float irisNorm = (ix * ix + iy * iy) / (irisR * irisR);
    if (irisNorm < 1.0 && eyelid > 0.18) {
      color = mix(color, vec3(186.0/255.0, 46.0/255.0, 28.0/255.0), 0.82);
    }
    float pupilNorm = (ix * ix + iy * iy) / (pupilR * pupilR);
    if (pupilNorm < 1.0 && eyelid > 0.22) {
      color = mix(color, vec3(18.0/255.0, 8.0/255.0, 6.0/255.0), 0.92);

    float glintDx = tx - (ox - rx * 0.18);
    float glintDy = ty - (oy - ry * 0.22);
    float glint = glintDx * glintDx + glintDy * glintDy;
    if (glint < 3.5 && eyelid > 0.35) {

 надёжное оружие для длинных узких коридоров.","НА ТЕХЭТАЖЕ САМОСБОРЫ происходят чаще. Будьте бдительны, товарищи.","На нижних уровнях САМОСБОРЫ практически не прекращаются. Удачи...","Люди запомнят твои поступки. Подумай наперёд прежде чем нажать на курок...","СИГАРЕТЫ и КНИГИ скрашивают досуг. ТУАЛЕТНАЯ БУМАГА… она тоже нужна.","КВАРТИРЫ — единственные безопасные места во время САМОСБОРА.","СОН восстанавливает силы. Спи в безопасном месте.","Ищи ЛИФТ, чтобы перемещаться между этажами.","ФАЗОВЫЙ СДВИГ позволяет проходить сквозь стены. Но смена фазы не защищает от урона и последствий.","Сгусток МЕТКА сохраняет отпечаток окружающего пространства в пси поле.","Сгусток ВОЗВРАТ отображает окружающее пространство к отпечатку в пси поле.","Сгусток КОНТРОЛЬ подчиняет психику чуждого организма. Но ненадолго.","ВЫЖИГ МОЗГА мгновенно убивает организм со слабой психикой.","Каша и тушёнка насыщают лучше хлеба.","Товарищи, не ссыте на пол! Пользуйтесь ТУАЛЕТОМ!","Заводчане, рабочий день начинается в 8 утра. Не опаздывайте на работу!","Товарищи жильцы, оказывайте полное содействие ЛИКВИДАТОРАМ: лучше доложить чем сокрыть!","Не пытайся спрятаться от ДУХА за стенами, убегать от него тоже не лучшая идея. ","Коллеги, в коем случе не приближайтесь к ИДОЛАМ, они вызывают [УДАЛЕНО] в пси-поле.","ЛИКВИДАТОРЫ - это единственный рубеж обороны человечества от ужасов САМОСБОРА. Служба в их рядах - пожизненная.","Большая часть населения гигахруща - это простые рабочие, инженеры и секретари. На труде простых ГРАЖДАН держится вся жизнь.","УЧЁНЫЕ из НИИ СЛИЗИ занимаются исследованием САМОСБОРОВ и разработкой способов противодействия им.","Те немногие, кто пережил САМОСБОР телом, теряют рассудок и примыкают к чёрным КУЛЬТАМ. Ведь бетон шепчет...","В заброшенных блоках ГИГАХРУЩА живут ДИКИЕ - не более чем бандиты и мародёры, для которых мораль - пустое слово.","...ЧЕРНОБОГ ОТЧЕ НАШ УКАЖИ НАМ ПУТЬ В ТОЛЩЕ ДА СОБЕРИ ТЕЛА НАШИ ЯКО СОБИРАЛ ТЫ ДУШИ НАШИ...","Иногда после САМОСБОРА остаются изменённые СГУСТКИ - плоть смешанная с бетоном. В руках пси-чувствительного это опасное оружие.","Новейшие разработки НИИ СЛИЗИ - ГАУС винтовка, плазмосмострел и БЭФЭГЭ не имеют аналогов в мире.","ХА МЕ ХА МЕ ХА!","СИЛА необходима для ближнего боя и выживания, хорошая ЛОВКОСТЬ обеспечивает подвижность и темп стрельбы, а для пси-способностей необходим высокий ИНТЕЛЛЕКТ.","РУБЛИ - основная валюта Народной Республики ГИГАХРУЩ. Они выпускаются в далёком блоке казначейства и распостранены во всех направлениях на тысячи километров.","Товарищи, заботьтесь о чистоте и порядке в своих блоках, устраивайте субботники и используйте ЧИСТЯЩИЕ НАБОРЫ. Общество будет благодарно вам за это!","Товарищи, помогайте друг другу! Спроси своего соседа по квартире не нужна ли ему помощь?","СБОРКА - довольно хрупкая тварь, её опасная разновидность - АРМАТУРА более крепкая.","КОШМАРИЩЕ не имеет постоянной формы поэтому опасно, пусть оно и не такое живучее как БЕТОННИК.","Помни что отчаянный человек с пушкой может оказаться страшнее любой твари","КАЛАШНИКОВ надёжен как бетонная стена. Если нашёл патроны 7.62 — считай, повезло.","ППШ сжирает патроны за секунды, но в узком коридоре ничего лучше не придумаешь.","ОГНЕМЁТ оставляет горящие следы на полу. Не наступай на собственный огонь.","ПЛАЗМАГАН — разработка НИИ СЛИЗИ. Стреляет быстро, но жрёт ЭНЕРГОЯЧЕЙКИ как не в себя.","БФГ уничтожает всё в радиусе восьми метров. Включая тебя, если стоишь слишком близко.","БЕНЗОПИЛА наносит чудовищный урон, но ломается быстрее любого оружия. Береги её для крупной дичи.","ГРАНАТА — друг ликвидатора в тесных помещениях. Главное — успеть отбежать.","ГАУСС-ВИНТОВКА пробивает даже БЕТОННИКА насквозь. Один выстрел — долгая перезарядка.","СВЯТАЯ ВОДА лечит и восстанавливает пси-энергию. Паломники клянутся, что она освящена самим ХРУЩОМ.","ОТБОЙНЫЙ МОЛОТОК может пробить стену, но у него всего десять ударов. Выбирай стену с умом.","Установи ДВЕРЬ в коридоре — и у тебя будет укрытие от тварей. Один комплект — одна дверь.","БЛОК КОМПЛЕКТ позволяет заложить проход стеной. Иногда лучшая оборона — стена за спиной.","ПЫЛЕСОС всасывает фиолетовый туман САМОСБОРА. Пятьдесят зарядов — и он сдохнет.","АНТИДЕПРЕССАНТ восстанавливает пси-энергию. Учёные утверждают что это побочный эффект.","Не забывай СПАТЬ. Усталость убивает не хуже голода — просто медленнее.","Если нужда припёрла — ищи САНУЗЕЛ. Здоровье важнее гордости.","Повары готовят лучшую еду в ГИГАХРУЩЕ. Помоги повару — получишь горячую КАШУ.","СЛЕСАРЬ может починить сломанный ФОНАРИК или подкинуть ГАЕЧНЫЙ КЛЮЧ. Дружи со слесарями.","КЛАДОВЩИК — лучший торговец в жилом блоке. У него есть всё, но за всё он просит РУБЛИ.","ВРАЧ перевяжет раны и даст ТАБЛЕТКИ. Не проходи мимо МЕДПУНКТА.","ДИРЕКТОР встречается крайне редко. Говорят, он знает коды от всех ГЕРМОДВЕРЕЙ в блоке.","ПАЛОМНИКИ — бродячие культисты. Не все из них враждебны, но доверять им не стоит.","ОХОТНИКИ из ЛИКВИДАТОРОВ патрулируют коридоры и зачищают тварей. Помоги им — и они помогут тебе.","ГРАЖДАНЕ составляют большинство населения. Не стреляй в безоружных — люди запоминают.","Отношения с ФРАКЦИЯМИ определяют кто тебе друг, а кто враг. Репутация дороже патронов.","Убийство члена фракции ухудшает отношения со всей фракцией. Подумай прежде чем стрелять.","ДИКИЕ не признают законов. Им нечего терять и нечего предложить кроме пули.","КУЛЬТИСТЫ верят что ГИГАХРУЩ — живое существо. Стены — его плоть, двери — его суставы.","НИИ СЛИЗИ изучает природу САМОСБОРА. Их лаборатория — одно из самых безопасных мест в блоке.","ЯКОВ ДАВИДОВИЧ уверен, что САМОСБОР и КУЛЬТЫ связаны. Возможно, старый профессор что-то знает.","МАЙОР ГРОМНЫЙ командует ЛИКВИДАТОРАМИ на нижних блокпостах. Крепкий мужик — лушче выполнять его приказы.","Если инструмент выкинуть на пол,  он может сломаться, береги инструменты и не роняй их.","Кто-то нашёл выход из ГИГАХРУЩА. Вернулся обратно через стену с другой стороны.","Этажей нет. Есть только бесконечный серый ТОР из комнат и коридоров.","САМОСБОР — не землетрясение. Это ХРУЩ переваривает сам себя.","Мой сосед ушёл за водой два САМОСБОРА назад. Коридор, по которому он ушёл, больше не существует.","Если слышишь скрежет — беги в квартиру и закрой дверь. ГЕРМЕТИЧНО.","Они выходят из стен. Буквально. Бетон расступается и закрывается за ними.","ПСИ УДАР — простейший сгусток, но в умелых руках и он смертоносен.","РАЗРЫВ взрывается при контакте, задевая всё вокруг. Не стой рядом с целью.","ПСИ БУРЯ обрушивает волну энергии на всех врагов в поле зрения. Дорого, но эффективно.","БЕЗУМИЕ заставляет тварь атаковать своих. Наблюдать за этим весьма любопытно.","КОЛЛЕКТОРЫ — густая сеть труб и тоннелей под жилой зоной. Там темно, сыро и САМОСБОРЫ чаще.","В [УДАЛЕНО] САМОСБОР не прекращается почти никогда. Плоть смешана с бетоном, а воздух пахнет железом.","[УДАЛЕНО] — измерение за пределами ГИГАХРУЩА. Туда не попасть без уничтожения [УДАЛЕНО].","[УДАЛЕНО] — высокие древоподобные сущности с глазами на стеблях. Они стреляют издалека и крайне опасны.","[УДАЛЕНО] заточён в [УДАЛЕНО]. Он шепчет, направляет, обещает выход... но можно ли ему верить?","[ДАННЫЕ УДАЛЕНЫ]"];function Ac(){const t=Math.floor(Math.random()*qi.length);return`Совет ${t+1}: ${qi[t]}`}const An=document.getElementById("game"),bt=document.getElementById("hud"),Nt=bt.getContext("2d");function vc(){An.width=window.innerWidth,An.height=window.innerHeight,bt.width=window.innerWidth,bt.height=window.innerHeight}window.addEventListener("resize",vc);vc();const Sc=jh(),Cc=Hd();let z,nt,W,L,Tt={v:1},ko=100,pe=null,ge=null,Ya=!1,Zi=Ac();function Nc(){Zi=Ac(),Nt.fillStyle="#000",Nt.fillRect(0,0,bt.width,bt.height),Nt.fillStyle="#aaa",Nt.font=`${Math.round(bt.height/20)}px monospace`,Nt.textAlign="center",Nt.fillText("ЗАГРУЗКА...",bt.width/2,bt.height/2);const t=Math.max(14,Math.round(bt.height/40));Nt.font=`${t}px monospace`,Nt.fillStyle="#777";const e=bt.width*.85,o=Zi.split(" "),n=[];let a=o[0];for(let r=1;r<o.length;r++){const c=a+" "+o[r];Nt.measureText(c).width>e?(n.push(a),a=o[r]):a=c}n.
