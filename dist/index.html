ть.","Когда услышите сирену — это САМОСБОР. Бегите в ближайшую комнату и закройте дверь! Коридоры смертельно опасны.","Фиолетовый туман убивает. Из него лезут твари. Не стойте в тумане — бегите к шлюзу.","Нажмите M — карта. Q — журнал заданий. Общайтесь с жителями, помогайте — от них зависит выживание.","У меня есть для вас задание. Откройте вкладку «Задание» — я расскажу."],talkLinesPost:["Приходи если ранен. Помогу.","Таблеток мало осталось.","Мне пора на работу. Береги себя."]},barni:{name:"Барни",isFemale:!1,faction:Y.LIQUIDATOR,occupation:w.HUNTER,sprite:w.HUNTER,hp:120,maxHp:120,money:80,speed:1.4,inventory:[{defId:"makarov",count:1},{defId:"ammo_9mm",count:8},{defId:"canned",count:1}],talkLines:["Я Барни, старший ликвидатор. Добро пожаловать в оружейную.","Стреляй по мишеням — тренируйся. Патроны забирай со стойки.","Макаров — лучший друг в лабиринте. Держи его заряженным.","Слышишь сирену — хватай ствол и к двери. В коридоре без оружия — труп.","Мишени на стене — стреляй сколько хочешь. Следы от пуль видно.","Бетонник? Не лезь с ножом. Только с огнестрелом. И то — издалека."],talkLinesPost:[]},yakov:{name:"Яков Давидович",isFemale:!1,faction:Y.SCIENTIST,occupation:w.SCIENTIST,sprite:w.SCIENTIST,hp:80,maxHp:80,money:60,speed:1,inventory:[{defId:"psi_strike",count:1},{defId:"antidep",count:1}],talkLines:[],talkLinesPost:["Исследования продолжаются. Не мешай.","Самосбор и культы — тут есть связь. Я чувствую это.","Возвращайся, если найдёшь что-то необычное."],talkQuestResponse:"Ольга прислала? Хорошо. Я занимаюсь пси-явлениями хруща. Возьмите это — пригодится."},vanka:{name:"Ванька Банчиный",isFemale:!1,faction:Y.CULTIST,occupation:w.ALCOHOLIC,sprite:w.ALCOHOLIC,hp:60,maxHp:60,money:5,speed:.9,inventory:[{defId:"bread",count:1},{defId:"cigs",count:2}],talkLines:["А?! Кто?! Не трогай! Ванька не виноват! Ванька ничего не делал!","Чернобог… Чернобог идёт… ОН ВСЕГДА ИДЁТ… стены дышат, слышишь?","Теневик! Теневик он злой! Петля! Плохой человек! Приказал страшно!","Тени ползут… из стен… из пола… Теневик командует ими… он не человек уже…","Ванька видел! Ванька всё видел! Глаза в темноте! Фиолетовые!","Убей его! УБЕЙ ТЕНЕВИКА! Тогда Ванька спать сможет… может быть…"],talkLinesPost:["Тише стало… но стены всё ещё дышат…","Ванька боится. Всегда боится.","Спасибо тебе… Теневик больше не приходит во снах…"],talkQuestResponse:"Яков? Яков послал?! Учёный… Ванька расскажет! Теневик! Он злой! Петля! Плохой человек! Приказал страшно! Убей его! УБЕЙ!"},major_grom:{name:"Майор Громный",isFemale:!1,faction:Y.LIQUIDATOR,occupation:w.HUNTER,sprite:w.HUNTER,hp:180,maxHp:180,money:120,speed:1.5,inventory:[{defId:"makarov",count:1},{defId:"ammo_9mm",count:12},{defId:"canned",count:2},{defId:"bandage",count:2}],talkLines:["Майор Громный, ликвидатор. Осваиваем этот блок — трубы, крысы, твари.","Наверху полегче. Тут — каждый коридор может быть последним.","Если Яков послал — значит дело серьёзное. Слушаю.","Теневики? Видали. Гадость. Но у нас тут проблемы поважнее — тварей полно."],talkLinesPost:["Форпост держим. Заходи если что.","Мои ребята патрулируют. Пока справляемся.","Яков хороший мужик. Передавай привет."],talkQuestResponse:"Яков прислал? Слышал о теневиках. Поможешь отбиться от тварей — расскажу всё, что знаю."}},Go=[{giverNpcId:"olga",type:rt.TALK,desc:"Ольга Дмитриевна: «Сходите в оружейную. Поговорите с Барни — он научит стрелять.»",targetNpcId:"barni",rewardItem:"makarov",rewardCount:1,extraRewards:[{defId:"ammo_9mm",count:8}],relationDelta:10,xpReward:10},{giverNpcId:"barni",type:rt.TALK,desc:"Барни: «Доложите Ольге Дмитриевне, что вы вооружены и готовы.»",targetNpcId:"olga",rewardItem:"bandage",rewardCount:2,extraRewards:[{defId:"water",count:2},{defId:"bread",count:2}],relationDelta:12,xpReward:10},{giverNpcId:"olga",type:rt.TALK,desc:"Ольга Дмитриевна: «Зайдите к моему коллеге — Якову Давидовичу. Его лаборатория {dir}. Изучает пси-явления.»",targetNpcId:"yakov",rewardItem:"psi_strike",rewardCount:1,relationDelta:10,xpReward:20},{give
