n{name:`${o}${a} ${s}`,female:e}}default:{const e=Math.random()<.5,o=me(e?Gc:Uc),n=me($c);return{name:`${o} ${n}${e?"а":""}`,female:e}}}}function _t(){return{food:70+Math.random()*30,water:70+Math.random()*30,sleep:60+Math.random()*40,pee:Math.random()*30,poo:Math.random()*20}}const Li=["Стены дышат. Я слышу как бетон стонет ночью.","Не ходите в коридоры после самосбора. Они голодны.","Дверь закрыта. Ключ проглочен стеной. Мы заперты.","Этажей нет. Есть только бесконечный лабиринт из комнат.","Я видел свою квартиру в другом конце. Там жил кто-то другой. С МОИМ лицом.","Бетонник не атакует если не двигаться. Наврали. Он просто медленный.","Запас еды тает. Кухня перестроилась. Консервы вросли в стену.","Самосбор — не землетрясение. Это ХРУЩ переваривает сам себя.","Они выходят из стен. Буквально. Бетон расступается и закрывается за ними.","Мой сосед ушёл за водой два самосбора назад. Коридор, по которому он шёл, больше не существует.","Если слышишь скрежет — беги в комнату и закрой дверь. Герметично.","Мы считали этажи. Их нет. Только тор. Бесконечный серый тор.","Кто-то нашёл выход. Вернулся через стену с другой стороны.","Записка: «НЕ СПАТЬ В КОРИДОРАХ»","Ползун не видит. Он чувствует вибрации. Замри."],Ne={olga:{name:"Ольга Дмитриевна",isFemale:!0,faction:j.SCIENTIST,occupation:Y.DOCTOR,sprite:Y.DOCTOR,hp:500,maxHp:500,money:50,speed:1.2,inventory:[{defId:"bandage",count:3},{defId:"pills",count:1},{defId:"water",count:2},{defId:"bread",count:2}],talkLines:["Добро пожаловать в блок! Я Ольга Дмитриевна, врач. Прочитайте слайды на стене — там основные правила.","Двигайтесь клавишами WASD, мышь — обзор. Нажмите E чтобы поговорить с кем-нибудь или открыть дверь.","Предметы подбираются автоматически. I — открыть инвентарь. F — отношения фракций. Кушайте вовремя, иначе здоровье падает.","Пробел или ЛКМ — удар/выстрел. Зайдите в оружейную — там Барни покажет как стрелять.","Когда услышите сирену — это САМОСБОР. Бегите в ближайшую комнату и закройте дверь! Коридоры смертельно опасны.","Фиолетовый туман убивает. Из него лезут твари. Не стойте в тумане — бегите к шлюзу.","Нажмите M — карта. Q — журнал заданий. Общайтесь с жителями, помогайте — от них зависит выживание.","У меня есть для вас задание. Откройте вкладку «Задание» — я расскажу."],talkLinesPost:["Приходи если ранен. Помогу.","Таблеток мало осталось.","Мне пора на работу. Береги себя."]},barni:{name:"Барни",isFemale:!1,faction:j.LIQUIDATOR,occupation:Y.HUNTER,sprite:Y.HUNTER,hp:600,maxHp:600,money:80,speed:1.4,inventory:[{defId:"makarov",count:1},{defId:"ammo_9mm",count:8},{defId:"canned",count:1}],talkLines:["Я Барни, старший ликвидатор. Добро пожаловать в оружейную.","Стреляй по мишеням — тренируйся. Патроны забирай со стойки.","Макаров — лучший друг в лабиринте. Держи его заряженным.","Слышишь сирену — хватай ствол и к двери. В коридоре без оружия — труп.","Мишени на стене — стреляй сколько хочешь. Следы от пуль видно.","Бетонник? Не лезь с ножом. Только с огнестрелом. И то — издалека."],talkLinesPost:[]},yakov:{name:"Яков Давидович",isFemale:!1,faction:j.SCIENTIST,occupation:Y.SCIENTIST,sprite:Y.SCIENTIST,hp:400,maxHp:400,money:60,speed:1,inventory:[{defId:"psi_strike",count:1},{defId:"antidep",count:1}],talkLines:[],talkLinesPost:["Исследования продолжаются. Не мешай.","Самосбор и культы — тут есть связь. Я чувствую это.","Возвращайся, если найдёшь что-то необычное."],talkQuestResponse:"Ольга прислала? Хорошо. Я занимаюсь пси-явлениями хруща. Возьмите это — пригодится."},vanka:{name:"Ванька Банчиный",isFemale:!1,faction:j.CULTIST,occupation:Y.ALCOHOLIC,sprite:Y.ALCOHOLIC,hp:300,maxHp:300,money:5,speed:.9,inventory:[{defId:"bread",count:1},{defId:"cigs",count:2}],talkLines:["А?! Кто?! Не трогай! Ванька не виноват! Ванька ничего не делал!","Чернобог… Чернобог идёт… ОН ВСЕГДА ИДЁТ… стены дышат, слышишь?","Теневик! Теневик он злой! Петля! Плохой человек! Приказал страшно!","Тени ползут… из стен… из пола… Теневик командует ими… он не человек уже…","Ванька видел! Ванька всё видел! Глаза в темноте! Фиолетовые!","Убей его! УБЕЙ ТЕНЕВИКА! Тогда Ванька спать сможет… может быть…"],talkLinesPost:["Тише стало… но стены всё ещё дышат…","Ванька боится. Всегда боится.","Спасибо тебе… Теневик больше не приходит во снах…"],talkQuestResponse:"Яков? Яков послал?! Учёный… Ванька расскажет! Теневик! Он злой! Петля! Плохой человек! Приказал страшно! Убей его! УБЕЙ!"},major_grom:{name:"Майор Громный",isFemale:!1,faction:j.LIQUIDATOR,occupation:Y.HUNTER,sprite:Y.HUNTER,hp:1e4,maxHp:1e4,money:120,speed:1.5,inventory:[{defId:"makarov",count:1},{defId:"ammo_9mm",count:12},{defId:"canned",count:2},{defId:"bandage",count:2}],talkLines:["Майор Громный, ликвидатор. Осваиваем этот блок — трубы, крысы, твари.","Наверху полегче. Тут — каждый коридор может быть последним.","Если Яков послал — значит дело серьёзное. Слушаю.","Теневики? Видали. Гадость. Но у нас тут проблемы поважнее — тварей полно."],talkLinesPost:["Форпост держим. Заходи если что.","Мои ребята патрулируют. Пока справляемся.","Яков хороший мужик. Передавай привет."],talkQuestResponse:"Яков прислал? Слышал о теневиках. Поможешь отбиться от тварей — расскажу всё, что знаю."},voice:{name:"Таинственный голос",isFemale:!1,faction:j.CITIZEN,occupation:Y.SCIENTIST,sprite:Y.SCIENTIST,hp:1,maxHp:1,money:0,speed:0,inventory:[],talkLines:[],talkLinesPost:[]}},ko=[{giverNpcId:"olga",type:dt.TALK,desc:"Ольга Дмитриевна: «Сходите в оружейную. Поговорите с Барни — он научит стрелять.»",targetNpcId:"barni",rewardItem:"makarov",rewardCount:1,extraRewards:[{defId:"ammo_9mm",count:8}],relationDelta:10,xpReward:10},{giverNpcId:"barni",type:dt.TALK,desc:"Барни: «Доложите Ольге Дмитриевне, что вы вооружены и готовы.»",targetNpcId:"olga",rewardItem:"bandage",rewardCount:2,extraRewards:[{defId:"water",count:2},{defId:"bread",count:2}],relationDelta:12,xpReward:10},{giverNpcId:"olga",type:dt.TALK,desc:"Ольга Дмитриевна: «Зайдите к моему коллеге — Якову Давидовичу. Его лаборатория {dir}. Изучает пси-явления.»",targetNpcId:"yako J("Портал перенёс вас в… Пустоту.",t.time,"#0f8")),t.msgs.push(J("̸̨̛̟̟̹̠̓ «А теперь ты исчезнешь, ищущий.»",t.time,"#f44")),t.msgs.push(J("̸̨̛̟̟̹̠̓ «Я вычеркну тебя из существования.»",t.time,"#f44")),t.msgs.push(J("Таинственный голос — это был Творец. Вы в ловушке.",t.time,"#fa0")),!t.quests.some(e=>e.plotStepIndex===12)){const e=t.nextQuestId++;t.quests.push({id:e,type:dt.KILL,giverId:-1,giverName:"Выживание",desc:"Найти и уничтожить Творца — единственный путь выбраться из Пустоты.",targetMonsterKind:k.CREATOR,killCount:0,killNeeded:1,rewardItem:"antidep",rewardCount:3,relationDelta:0,xpReward:500,moneyReward:0,plotStepIndex:12,done:!1}),t.msgs.push(J("Новое задание: Уничтожить Творца",t.time,"#4af"))}}const ei=["ВНИМАНИЕ! Товарищи жильцы, не открывайте ГЕРМОДВЕРЬ во время САМОСБОРА!","БЕТОННИК медленный, но крайне живучий. Лучше обойти его стороной.","ФОНАРИК освещает тёмные коридоры — ищи его в кладовых.","Человек может пережить САМОСБОР при большом везении, но ещё никто не прожил неделю без ВОДЫ.","НОЖ — первое оружие. МАКАРОВ — первая мечта.","После САМОСБОРА коридоры ГИГАХРУЩА перестраиваются, лишь ГЕРМОБЛОКИ остаются на месте.","Если услышишь сирену — САМОСБОР начался. Беги в ближайшую квартиру.","ПОЛЗУНЫ реагируют на вибрации. Не пытайся убежать от них — двигайся тихо.","Читай всё, что найдёшь, возможно ты узнаешь местонахождение ТАЙНИКА или... время своей смерти.","Пси-сгустки тратят пси-энергию. ТАБЛЕТКИ её восстанавливают.","БИНТ может остановить лёгкое кровотечение, но для серьёзных ран нужен медицинский набор.","Не оставляй ДВЕРИ шлюзов открытыми. Закрытая ДВЕРЬ — твой щит.","МАТКА порождает новых тварей. Убей её первой.","ТЕНЕВИК быстр и скрытен. Всегда будь начеку в тёмных коридорах.","ГЛАЗ стреляет издалека. Сокращай дистанцию или прячься за укрытием, если хочешь выжить.","МЕРТВЯКИ слабы поодиночке, но опасны в группах.","ОБРЕЗ наносит огромный урон вблизи, но бесполезен на расстоянии.","ГВОЗДОМЁТ — надёжное оружие для длинных узких коридоров.","НА ТЕХЭТАЖЕ САМОСБОРЫ происходят чаще. Будьте бдительны, товарищи.","На нижних уровнях САМОСБОРЫ практически не прекращаются. Удачи...","Люди запомнят твои поступки. Подумай наперёд прежде чем нажать на курок...","СИГАРЕТЫ и КНИГИ скрашивают досуг. ТУАЛЕТНАЯ БУМАГА… она тоже нужна.","КВАРТИРЫ — единственные безопасные места во время САМОСБОРА.","СОН восстанавливает силы. Спи в безопасном месте.","Ищи ЛИФТ, чтобы перемещаться между этажами.","ФАЗОВЫЙ СДВИГ позволяет проходить сквозь стены. Но смена фазы не защищает от урона и последствий.","Сгусток МЕТКА сохраняет отпечаток окружающего пространства в пси поле.","Сгусток ВОЗВРАТ отображает окружающее пространство к отпечатку в пси поле.","Сгусток КОНТРОЛЬ подчиняет психику чуждого организма. Но ненадолго.","ВЫЖИГ МОЗГА мгновенно убивает организм со слабой психикой.","Каша и тушёнка насыщают лучше хлеба.","Товарищи, не ссыте на пол! Пользуйтесь ТУАЛЕТОМ!","Заводчане, рабочий день начинается в 8 утра. Не опаздывайте на работу!","Товарищи жильцы, оказывайте полное содействие ЛИКВИДАТОРАМ: лучше доложить чем сокрыть!","Не пытайся спрятаться от ДУХА за стенами, убегать от него тоже не лучшая идея. ","Коллеги, в коем случе не приближайтесь к ИДОЛАМ, они вызывают [УДАЛЕНО] в пси-поле.","ЛИКВИДАТОРЫ - это единственный рубеж обороны человечества от ужасов САМОСБОРА. Служба в их рядах - пожизненная.","Большая часть населения гигахруща - это простые рабочие, инженеры и секретари. На труде простых ГРАЖДАН держится вся жизнь.","УЧЁНЫЕ из НИИ СЛИЗИ занимаются исследованием САМОСБОРОВ и разработкой способов противодействия им.","Те немногие, кто пережил САМОСБОР телом, теряют рассудок и примыкают к чёрным КУЛЬТАМ. Ведь бетон шепчет...","В заброшенных блоках ГИГАХРУЩА живут ДИКИЕ - не более чем бандиты и мародёры, для которых мораль - пустое слово.","...ЧЕРНОБОГ ОТЧЕ НАШ УКАЖИ НАМ ПУТЬ В ТОЛЩЕ ДА СОБЕРИ ТЕЛА НАШИ ЯКО СОБИРАЛ ТЫ ДУШИ НАШИ...","Иногда после САМОСБОРА остаются изменённые СГУСТКИ - плоть смешанная с бетоном. В руках пси-чувствительного это опасное оружие.","Новейшие разработки НИИ СЛИЗИ - ГАУС винтовка, плазмосмострел и БЭФЭГЭ не имеют аналогов в мире.","ХА МЕ ХА МЕ ХА!","СИЛА необходима для ближнего боя и выживания, хорошая ЛОВКОСТЬ обеспечивает подвижность и темп стрельбы, а для пси-способностей необходим высокий ИНТЕЛЛЕКТ.","РУБЛИ - основная валюта Народной Республики ГИГАХРУЩ. Они выпускаются в далёком блоке казначейства и распостранены во всех направлениях на тысячи километров.","Товарищи, заботьтесь о чистоте и порядке в своих блоках, устраивайте субботники и используйте ЧИСТЯЩИЕ НАБОРЫ. Общество будет благодарно вам за это!","Товарищи, помогайте друг другу! Спроси своего соседа по квартире не нужна ли ему помощь?","СБОРКА - довольно хрупкая тварь, её опасная разновидность - АРМАТУРА более крепкая.","КОШМАРИЩЕ не имеет постоянной формы поэтому опасно, пусть оно и не такое живучее как БЕТОННИК.","Помни что отчаянный человек с пушкой может оказаться страшнее любой твари","КАЛАШНИКОВ надёжен как бетонная стена. Если нашёл патроны 7.62 — считай, повезло.","ППШ сжирает патроны за секунды, но в узком коридоре ничего лучше не придумаешь.","ОГНЕМЁТ оставляет горящие следы на полу. Не наступай на собственный огонь.","ПЛАЗМАГАН — разработка НИИ СЛИЗИ. Стреляет быстро, но жрёт ЭНЕРГОЯЧЕЙКИ как не в себя.","БФГ уничтожает всё в радиусе восьми метров. Включая тебя, если стоишь слишком близко.","БЕНЗОПИЛА наносит чудовищный урон, но ломается быстрее любого оружия. Береги её для крупной дичи.","ГРАНАТА — друг ликвидатора в тесных помещениях. Главное — успеть отбежать.","ГАУСС-ВИНТОВКА пробивает даже БЕТОННИКА насквозь. Один выстрел — долгая перезарядка.","СВЯТАЯ ВОДА лечит и восстанавливает пси-энергию. Паломники клянутся, что она освящена самим ХРУЩОМ.","ОТБОЙНЫЙ МОЛОТОК может пробить стену, но у него всего десять ударов. Выбирай стену с умом.","Установи ДВЕРЬ в коридоре — и у тебя будет укрытие от тварей. Один комплект — одна дверь.","БЛОК КОМПЛЕКТ позволяет заложить проход стеной. Иногда лучшая оборона — стена за спиной.","ПЫЛЕСОС всасывает фиолетовый туман САМОСБОРА. Пятьдесят зарядов — и он сдохнет.","АНТИДЕПРЕССАНТ восстанавливает пси-энергию. Учёные утверждают что это побочный эффект.","Не забывай СПАТЬ. Усталость убивает не хуже голода — просто медленнее.","Если нужда припёрла — ищи САНУЗЕЛ. Здоровье важнее гордости.","Повары готовят лучшую еду в ГИГАХРУЩЕ. Помоги повару — получишь горячую КАШУ.","СЛЕСАРЬ может починить сломанный ФОНАРИК или подкинуть ГАЕЧНЫЙ КЛЮЧ. Дружи со слесарями.","КЛАДОВЩИК — лучший торговец в жилом блоке. У него есть всё, но за всё он просит РУБЛИ.","ВРАЧ перевяжет раны и даст ТАБЛЕТКИ. Не проходи мимо МЕДПУНКТА.","ДИРЕКТОР встречается крайне редко. Говорят, он знает коды от всех ГЕРМОДВЕРЕЙ в блоке.","ПАЛОМНИКИ — бродячие культисты. Не все из них враждебны, но доверять им не стоит.","ОХОТНИКИ из ЛИКВИДАТОРОВ патрулируют коридоры и зачищают тварей. Помоги им — и они помогут тебе.","ГРАЖДАНЕ составляют большинство населения. Не стреляй в безоружных — люди запоминают.","Отношения с ФРАКЦИЯМИ определяют кто тебе друг, а кто враг. Репутация дороже патронов.","Убийство члена фракции ухудшает отношения со всей фракцией. Подумай прежде чем стрелять.","ДИКИЕ не признают законов. Им нечего терять и нечего предложить кроме пули.","КУЛЬТИСТЫ верят что ГИГАХРУЩ — живое существо. Стены — его плоть, двери — его суставы.","НИИ СЛИЗИ изучает природу САМОСБОРА. Их лаборатория — одно из самых безопасных мест в блоке.","ЯКОВ ДАВИДОВИЧ уверен, что САМОСБОР и КУЛЬТЫ связаны. Возможно, старый профессор что-то знает.","МАЙОР ГРОМНЫЙ командует ЛИКВИДАТОРАМИ на нижних блокпостах. Крепкий мужик — лушче выполнять его приказы.","Стены дышат. Бетон стонет по ночам. Это не метафора.","Кто-то нашёл выход из ГИГАХРУЩА. Вернулся обратно через стену с другой стороны.","Этажей нет. Есть только бесконечный серый ТОР из комнат и коридоров.","САМОСБОР — не землетрясение. Это ХРУЩ переваривает сам себя.","Мой сосед ушёл за водой два САМОСБОРА назад. Коридор, по которому он ушёл, больше не существует.","Если слышишь скрежет — беги в квартиру и закрой дверь. ГЕРМЕТИЧНО.","Они выходят из стен. Буквально. Бетон расступается и закрывается за ними.","ПСИ УДАР — простейший сгусток, но в умелых руках и он смертоносен.","РАЗРЫВ взрывается при контакте, задевая всё вокруг. Не стой рядом с целью.","ПСИ БУРЯ обрушивает волну энергии на всех врагов в поле зрения. Дорого, но эффективно.","БЕЗУМИЕ заставляет тварь атаковать своих. Наблюдать за этим весьма любопытно.","КОЛЛЕКТОРЫ — густая сеть труб и тоннелей под жилой зоной. Там темно, сыро и САМОСБОРЫ чаще.","В [УДАЛЕНО] САМОСБОР не прекращается почти никогда. Плоть смешана с бетоном, а воздух пахнет железом.","[УДАЛЕНО] — измерение за пределами ГИГАХРУЩА. Туда не попасть без уничтожения [УДАЛЕНО].","[УДАЛЕНО] — высокие древоподобные сущности с глазами на стеблях. Они стреляют издалека и крайне опасны.","[УДАЛЕНО] заточён в [УДАЛЕНО]. Он шепчет, направляет, обещает выход... но можно ли ему верить?","[ДАННЫЕ УДАЛЕНЫ]"];function Nr(){const t=Math.floor(Math.random()*ei.length);return`Совет ${t+1}: ${ei[t]}`}const Bo=document.getElementById("game"),bt=document.getElementById("hud"),St=bt.getContext("2d");function Dr(){Bo.width=window.innerWidth,Bo.height=window.innerHeight,bt.width=window.innerWidth,bt.height=window.innerHeight}window.addEventListener("resize",Dr);Dr();const _r=N1(),Pr=Mh();let X,ot,H,O,gt={v:1},oo=100,fe=null,ue=null,sa=!1,oi=Nr();function kr(){oi=Nr(),St.fillStyle="#000",St.fillRect(0,0,bt.width,bt.height),St.fillStyle="#aaa",St.font=`${Math.round(bt.height/20)}px monospace`,St.textAlign="center",St.fillText("ЗАГРУЗКА...",bt.width/2,bt.height/2);const t=Math.max(14,Math.round(bt.height/40));St.font=`${t}px monospace`,St.fillStyle="#777";const e=bt.width*.85,o=oi.split(" "),n=[];let a=o[0];for(let r=1;r<o.length;r++){const c=a+" "+o[r];St.measureText(c).width>e?(n.push(a),a=o[r]):a=c}n.push(a);const s=t*1.3,i=bt.height/2+Math.round(bt.height/12);for(let r=0;r<n.length;r
