<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">САМОСБОР меняет состояние места</title>
  <desc id="desc">Before-after схема: слева место до самосбора, справа то же пространство после самосбора с мутировавшим состоянием, объектами и опасностью.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f1e8"/>
      <stop offset="1" stop-color="#e1d8ca"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111719"/>
      <stop offset="1" stop-color="#050808"/>
    </linearGradient>
    <linearGradient id="mutPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24131b"/>
      <stop offset="1" stop-color="#0b090a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1d1b16" flood-opacity="0.18"/>
    </filter>
    <filter id="violetGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L16 9 L2 16 Z" fill="#8b5cf6"/>
    </marker>
    <clipPath id="beforeClip">
      <rect x="76" y="222" width="700" height="430" rx="4"/>
    </clipPath>
    <clipPath id="afterClip">
      <rect x="824" y="222" width="700" height="430" rx="4"/>
    </clipPath>
    <style>
      .base { font-family: Inter, Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .h1 { font-size: 43px; font-weight: 850; fill: #16191c; }
      .sub { font-size: 22px; font-weight: 520; fill: #5c554d; }
      .panelTitle { font-size: 24px; font-weight: 850; fill: #e9f5f5; }
      .panelSmall { font-size: 18px; font-weight: 720; fill: #b4c3c3; }
      .badge { font-size: 28px; font-weight: 900; fill: #ffffff; }
      .badgeSub { font-size: 17px; font-weight: 760; fill: #e2dff4; }
      .chip { font-size: 19px; font-weight: 850; fill: #15191d; }
      .chipMuted { font-size: 18px; font-weight: 760; fill: #55504a; }
      .caption { font-size: 28px; font-weight: 820; fill: #16191c; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#pageBg)"/>
  <rect x="38" y="38" width="1524" height="824" rx="30" fill="#fffaf1" stroke="#d3c8b8" stroke-width="2"/>

  <g class="base">
    <text x="800" y="101" text-anchor="middle" class="h1">САМОСБОР: не фильтр, а мутация места</text>
    <text x="800" y="139" text-anchor="middle" class="sub">то же пространство после события получает другую геометрию, видимость, угрозы и следы</text>

    <g filter="url(#shadow)">
      <rect x="58" y="172" width="736" height="512" rx="18" fill="url(#darkPanel)" stroke="#164e57" stroke-width="2"/>
    </g>
    <text x="82" y="205" class="panelTitle">ДО САМОСБОРА</text>
    <text x="766" y="205" text-anchor="end" class="panelSmall">обычное состояние</text>
    <g clip-path="url(#beforeClip)">
      <image href="../screenshots/habr/pastsamosbor.png" x="76" y="222" width="700" height="430" preserveAspectRatio="xMidYMid slice"/>
      <rect x="76" y="222" width="700" height="430" fill="#061114" opacity="0.04"/>
    </g>
    <rect x="75" y="221" width="702" height="432" fill="none" stroke="#123f46" stroke-width="2"/>

    <g filter="url(#shadow)">
      <rect x="806" y="172" width="736" height="512" rx="18" fill="url(#mutPanel)" stroke="#5b2c83" stroke-width="2"/>
    </g>
    <text x="830" y="205" class="panelTitle">ПОСЛЕ САМОСБОРА</text>
    <text x="1514" y="205" text-anchor="end" class="panelSmall">измененное состояние</text>
    <g clip-path="url(#afterClip)">
      <image href="../screenshots/habr/samosvor.png" x="824" y="222" width="700" height="430" preserveAspectRatio="xMidYMid slice"/>
      <rect x="824" y="222" width="700" height="430" fill="#2a0716" opacity="0.05"/>
    </g>
    <rect x="823" y="221" width="702" height="432" fill="none" stroke="#7c4ac7" stroke-width="2"/>

    <g filter="url(#violetGlow)">
      <path d="M779 436 H821" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
      <circle cx="800" cy="436" r="24" fill="#fffaf1" stroke="#8b5cf6" stroke-width="3"/>
      <text x="800" y="445" text-anchor="middle" class="badge" fill="#5d2db9">!</text>
    </g>

    <g>
      <rect x="138" y="704" width="248" height="50" rx="25" fill="#e9f1ef" stroke="#a7b8b4" stroke-width="2"/>
      <text x="262" y="736" text-anchor="middle" class="chip">то же место</text>

      <rect x="420" y="704" width="256" height="50" rx="25" fill="#f0e7f4" stroke="#b99ed0" stroke-width="2"/>
      <text x="548" y="736" text-anchor="middle" class="chip">runtime event</text>

      <rect x="710" y="704" width="256" height="50" rx="25" fill="#f3e6e1" stroke="#c79c92" stroke-width="2"/>
      <text x="838" y="736" text-anchor="middle" class="chip">cells/features/fog</text>

      <rect x="1000" y="704" width="232" height="50" rx="25" fill="#efe8d9" stroke="#c5ad78" stroke-width="2"/>
      <text x="1116" y="736" text-anchor="middle" class="chip">опасность</text>

      <rect x="1266" y="704" width="220" height="50" rx="25" fill="#e9edf5" stroke="#a8b0c0" stroke-width="2"/>
      <text x="1376" y="736" text-anchor="middle" class="chip">aftershock</text>
    </g>

    <text x="800" y="832" text-anchor="middle" class="caption">САМОСБОР важен не как фильтр на экране, а как изменение состояния места.</text>
  </g>
</svg>
