<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">WebGL raycasting и DDA по клеткам</title>
  <desc id="desc">Слева игровой коридорный кадр, справа схема DDA-луча, который проходит по клеткам grid-карты до стены.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f1e8"/>
      <stop offset="1" stop-color="#e3dbcf"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111719"/>
      <stop offset="1" stop-color="#050808"/>
    </linearGradient>
    <linearGradient id="gridBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18222a"/>
      <stop offset="1" stop-color="#0e151a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1d1b16" flood-opacity="0.18"/>
    </filter>
    <marker id="rayArrow" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L16 9 L2 16 Z" fill="#42d5ff"/>
    </marker>
    <clipPath id="shotClip">
      <rect x="74" y="211" width="878" height="502" rx="2"/>
    </clipPath>
    <style>
      .base { font-family: Inter, Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .h1 { font-size: 43px; font-weight: 850; fill: #16191c; }
      .sub { font-size: 22px; font-weight: 520; fill: #5d574f; }
      .panelTitle { font-size: 24px; font-weight: 850; fill: #8ee9ef; }
      .panelSmall { font-size: 18px; font-weight: 700; fill: #659da1; }
      .rightTitle { font-size: 31px; font-weight: 850; fill: #171a1d; }
      .rightSub { font-size: 18px; font-weight: 560; fill: #5b554d; }
      .chip { font-size: 19px; font-weight: 850; fill: #17202a; }
      .chipLight { font-size: 18px; font-weight: 800; fill: #dff8ff; }
      .caption { font-size: 28px; font-weight: 820; fill: #16191c; }
      .code { font-family: Menlo, Consolas, monospace; font-size: 18px; font-weight: 700; fill: #27313a; }
      .cellText { font-size: 16px; font-weight: 760; fill: #d4edf2; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#pageBg)"/>
  <rect x="38" y="38" width="1524" height="824" rx="30" fill="#fffaf1" stroke="#d3c8b8" stroke-width="2"/>

  <g class="base">
    <text x="800" y="101" text-anchor="middle" class="h1">Клеточная геометрия, 2.5D-проекция</text>
    <text x="800" y="139" text-anchor="middle" class="sub">игровой кадр слева, справа один луч проходит grid-клетки DDA-шагами</text>

    <g filter="url(#shadow)">
      <rect x="58" y="164" width="974" height="598" rx="18" fill="url(#darkPanel)" stroke="#164e57" stroke-width="2"/>
    </g>
    <text x="82" y="198" class="panelTitle">ИГРОВОЙ КАДР</text>
    <text x="1008" y="198" text-anchor="end" class="panelSmall">WebGL raycasting output</text>

    <g clip-path="url(#shotClip)">
      <image href="../screenshots/habr/Screenshot%202026-06-08%20at%2022.00.32.png" x="74" y="211" width="878" height="502" preserveAspectRatio="xMidYMid slice"/>
      <rect x="74" y="211" width="878" height="502" fill="#061114" opacity="0.06"/>
    </g>
    <rect x="73" y="210" width="880" height="504" fill="none" stroke="#123f46" stroke-width="2"/>

    <g filter="url(#shadow)">
