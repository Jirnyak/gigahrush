<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MESH PASS поверх клеточного мира</title>
  <desc id="desc">Игровой кадр с render-only mesh pass, референс Windows pipes screensaver и схема процедурного радиуса вокруг игрока по seed и cell index.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f1e8"/>
      <stop offset="1" stop-color="#e2dbce"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101719"/>
      <stop offset="1" stop-color="#050808"/>
    </linearGradient>
    <linearGradient id="techChip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a30"/>
      <stop offset="1" stop-color="#1d4249"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1d1b16" flood-opacity="0.18"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="gameClip">
      <rect x="76" y="214" width="790" height="468" rx="4"/>
    </clipPath>
    <clipPath id="refClip">
      <rect x="1062" y="718" width="122" height="74" rx="6"/>
    </clipPath>
    <style>
      .base { font-family: Inter, Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .h1 { font-size: 43px; font-weight: 850; fill: #16191c; }
      .sub { font-size: 22px; font-weight: 520; fill: #5c554d; }
      .panelTitle { font-size: 24px; font-weight: 850; fill: #8ee9ef; }
      .panelSmall { font-size: 18px; font-weight: 720; fill: #6d9da0; }
      .rightTitle { font-size: 31px; font-weight: 850; fill: #171a1d; }
      .rightSub { font-size: 18px; font-weight: 560; fill: #5b554d; }
      .chipMain { font-size: 30px; font-weight: 900; fill: #ffffff; }
      .chipSub { font-size: 18px; font-weight: 650; fill: #bfe2e6; }
      .boxHead { font-size: 21px; font-weight: 850; fill: #12171b; }
      .boxText { font-size: 18px; font-weight: 650; fill: #55504a; }
      .code { font-family: Menlo, Consolas, monospace; font-size: 17px; font-weight: 750; fill: #21454d; }
      .caption { font-size: 28px; font-weight: 820; fill: #16191c; }
      .tiny { font-size: 16px; font-weight: 760; fill: #5d554b; }
      .radiusLabel { font-size: 16px; font-weight: 850; fill: #e8ffff; }
      .refTitle { font-size: 18px; font-weight: 850; fill: #dff8ff; }
      .refText { font-size: 18px; font-weight: 800; fill: #bfe6e1; }
      .refSmall { font-size: 15px; font-weight: 760; fill: #94b7b2; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#pageBg)"/>
  <rect x="38" y="38" width="1524" height="824" rx="30" fill="#fffaf1" stroke="#d3c8b8" stroke-width="2"/>

  <g class="base">
    <text x="800" y="101" text-anchor="middle" class="h1">MESH PASS: объем без смены симуляции</text>
    <text x="800" y="139" text-anchor="middle" class="sub">render-only трубы, панели и объемные детали строятся вокруг камеры по seed и cell index</text>

    <g filter="url(#shadow)">
      <rect x="58" y="164" width="826" height="528" rx="18" fill="url(#darkPanel)" stroke="#164e57" stroke-width="2"/>
    </g>
    <text x="82" y="198" class="panelTitle">ИГРОВОЙ MESH PASS</text>
    <text x="858" y="198" text-anchor="end" class="panelSmall">WebGL layer after raycaster</text>
    <g clip-path="url(#gameClip)">
      <image href="../screenshots/habr/meshes.png" x="76" y="214" width="790" height="468" preserveAspectRatio="xMidYMid slice"/>
      <rect x="76" y="214" width="790" height="468" fill="#061114" opacity="0.04"/>
    </g>
    <rect x="75" y="213" width="792" height="470" fill="none" stroke="#123f46" stroke-width="2"/>

    <g filter="url(#glow)">
      <circle cx="552" cy="424" r="70" fill="#34d6ce" opacity="0.13"/>
      <circle cx="552" cy="424" r="70" fill="none" stroke="#83fff3" stroke-width="3" stroke-dasharray="10 9"/>
      <text x="552" y="429" text-anchor="middle" class="radiusLabel">camera radius</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="918" y="164" width="524" height="528" rx="18" fill="#fffaf1" stroke="#d3c8b8" stroke-width="2"/>
    </g>
    <text x="1180" y="213" text-anchor="middle" class="rightTitle">Как это работает</text>
    <text x="1180" y="241" text-anchor="middle" class="rightSub">плоская клетка остается truth, mesh только рисует объем</text>

    <rect x="1010" y="268" width="360" height="82" rx="22" fill="url(#techChip)"/>
    <text x="1190" y="314" text-anchor="middle" class="chipMain">seed + cell index</text>
    <text x="1190" y="338" text-anchor="middle" class="chipSub">детерминированная локальная сеть</text>

    <g>
      <rect x="970" y="384" width="204" height="82" rx="14" fill="#e7f3f2" stroke="#9fc6c2" stroke-width="2"/>
      <text x="994" y="414" class="boxHead">radius</text>
      <text x="994" y="442" class="boxText">4 / 8 / 16 cells</text>

      <rect x="1198" y="384" width="204" height="82" rx="14" fill="#f1ecdf" stroke="#c8b68b" stroke-width="2"/>
      <text x="1222" y="414" class="boxHead">cap</text>
      <text x="1222" y="442" class="boxText">128 / 256 / 512</text>

      <rect x="970" y="484" width="204" height="82" rx="14" fill="#eee7f3" stroke="#bca1c8" stroke-width="2"/>
      <text x="994" y="514" class="boxHead">order</text>
      <text x="994" y="542" class="boxText">priority + distance</text>

      <rect x="1198" y="484" width="204" height="82" rx="14" fill="#e9edf5" stroke="#a8b0c0" stroke-width="2"/>
      <text x="1222" y="514" class="boxHead">truth</text>
      <text x="1222" y="542" class="boxText">no collision/save</text>
    </g>

    <rect x="970" y="606" width="390" height="44" rx="14" fill="#eff3f2" stroke="#c6cecb" stroke-width="2"/>
    <text x="1165" y="633" text-anchor="middle" class="code">raycaster -> mesh -> sprites</text>

    <g filter="url(#shadow)">
      <rect x="1048" y="704" width="386" height="104" rx="14" fill="#11191b" stroke="#7ecfc6" stroke-width="2"/>
      <g clip-path="url(#refClip)">
        <image href="../screenshots/habr/vodoprovod.jpg" x="1062" y="718" width="122" height="74" preserveAspectRatio="xMidYMid slice"/>
      </g>
      <rect x="1061" y="717" width="124" height="76" fill="none" stroke="#7ecfc6" stroke-width="2"/>
      <text x="1210" y="738" class="refTitle">inspiration</text>
      <text x="1210" y="764" class="refText">Windows pipes</text>
      <text x="1210" y="788" class="refSmall">seeded procedural pipes</text>
    </g>

    <text x="800" y="832" text-anchor="middle" class="caption">MESH PASS добавляет объемные трубы и детали вокруг игрока, не превращая World в 3D-сцену.</text>
  </g>
</svg>
