<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">A-Life identity и последствия</title>
  <desc id="desc">Слева скриншот профиля NPC в Инфосети Демос, справа схема persistent record, materialized entity и foldback последствий.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f1e8"/>
      <stop offset="1" stop-color="#e2dbce"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#091314"/>
      <stop offset="1" stop-color="#030607"/>
    </linearGradient>
    <linearGradient id="recordChip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#112633"/>
      <stop offset="1" stop-color="#203a4b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1d1b16" flood-opacity="0.18"/>
    </filter>
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L12 7 L2 12 Z" fill="#31d7c4"/>
    </marker>
    <clipPath id="demoClip">
      <rect x="72" y="210" width="930" height="550" rx="4"/>
    </clipPath>
    <style>
      .base { font-family: Inter, Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .h1 { font-size: 43px; font-weight: 850; fill: #16191c; }
      .sub { font-size: 22px; font-weight: 520; fill: #5b554d; }
      .panelTitle { font-size: 24px; font-weight: 850; fill: #6dfff0; }
      .panelSmall { font-size: 18px; font-weight: 700; fill: #6d9da0; }
      .rightTitle { font-size: 31px; font-weight: 850; fill: #171a1d; }
      .rightSub { font-size: 18px; font-weight: 560; fill: #5b554d; }
      .chipMain { font-size: 28px; font-weight: 900; fill: #ffffff; }
      .chipSub { font-size: 18px; font-weight: 650; fill: #bdd9df; }
      .boxHead { font-size: 21px; font-weight: 850; fill: #12171b; }
      .boxText { font-size: 18px; font-weight: 650; fill: #55504a; }
      .code { font-family: Menlo, Consolas, monospace; font-size: 17px; font-weight: 750; fill: #23424a; }
      .caption { font-size: 28px; font-weight: 820; fill: #16191c; }
      .tag { font-size: 18px; font-weight: 850; fill: #0f2227; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#pageBg)"/>
  <rect x="38" y="38" width="1524" height="824" rx="30" fill="#fffaf1" stroke="#d3c8b8" stroke-width="2"/>

  <g class="base">
    <text x="800" y="101" text-anchor="middle" class="h1">A-Life: identity и последствия</text>
    <text x="800" y="139" text-anchor="middle" class="sub">Инфосеть Демос показывает не декорацию рядом с камерой, а persistent record NPC</text>

    <g filter="url(#shadow)">
      <rect x="56" y="164" width="962" height="604" rx="18" fill="url(#darkPanel)" stroke="#087a72" stroke-width="2"/>
    </g>
    <text x="82" y="198" class="panelTitle">ИНФОСЕТЬ ДЕМОС</text>
    <text x="990" y="198" text-anchor="end" class="panelSmall">raw screenshot</text>

    <g clip-path="url(#demoClip)">
      <image href="../screenshots/habr/Screenshot%202026-06-08%20at%2022.15.33.png" x="72" y="210" width="930" height="550" preserveAspectRatio="xMidYMid slice"/>
      <rect x="72" y="210" width="930" height="550" fill="#061114" opacity="0.03"/>
    </g>
    <rect x="71" y="209" width="932" height="552" fill="none" stroke="#0bc6b5" stroke-width="2"/>

    <g filter="url(#cyanGlow)">
      <rect x="432" y="378" width="180" height="44" rx="22" fill="#0bc6b5" opacity="0.16"/>
      <path d="M448 400 H596" stroke="#98fff4" stroke-width="3" stroke-linecap="round"/>
      <path d="M522 386 V414" stroke="#98fff4" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="1050" y="164" width="492" height="604" rx="18" fill="#fffaf1" stroke="#d3c8b8" stroke-width="2"/>
    </g>
    <text x="1296" y="213" text-anchor="middle" class="rightTitle">Что хранит A-Life</text>
    <text x="1296" y="241" text-anchor="middle" class="rightSub">живая сущность только временно раскрывает запись</text>

    <rect x="1118" y="267" width="374" height="84" rx="22" fill="url(#recordChip)"/>
    <text x="1305" y="314" text-anchor="middle" class="chipMain">persistent record</text>
    <text x="1305" y="338" text-anchor="middle" class="chipSub">identity живет между этажами</text>

    <path d="M1305 354 V392" stroke="#31d7c4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

    <g>
      <rect x="1088" y="404" width="222" height="86" rx="14" fill="#e7f3f2" stroke="#9fc6c2" stroke-width="2"/>
      <text x="1114" y="434" class="boxHead">identity</text>
      <text x="1114" y="462" class="code">alifeId / npcId</text>

      <rect x="1326" y="404" width="182" height="86" rx="14" fill="#f1ecdf" stroke="#c8b68b" stroke-width="2"/>
      <text x="1352" y="434" class="boxHead">facts</text>
      <text x="1352" y="462" class="boxText">работа, фракция</text>

      <rect x="1088" y="508" width="222" height="86" rx="14" fill="#eee7f3" stroke="#bca1c8" stroke-width="2"/>
      <text x="1114" y="538" class="boxHead">relations</text>
      <text x="1114" y="566" class="boxText">семья, друзья, враги</text>

      <rect x="1326" y="508" width="182" height="86" rx="14" fill="#f3e7e5" stroke="#ca9d98" stroke-width="2"/>
      <text x="1352" y="538" class="boxHead">state</text>
      <text x="1352" y="566" class="boxText">страхи, теги, HP</text>
    </g>

    <path d="M1110 621 H1488" stroke="#31d7c4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="1100" y="629" width="162" height="44" rx="22" fill="#e2f3f0" stroke="#9fc6c2" stroke-width="2"/>
    <rect x="1280" y="629" width="138" height="44" rx="22" fill="#f1ecdf" stroke="#c8b68b" stroke-width="2"/>
    <rect x="1434" y="629" width="74" height="44" rx="22" fill="#f3e7e5" stroke="#ca9d98" stroke-width="2"/>
    <text x="1181" y="657" text-anchor="middle" class="tag">materialize</text>
    <text x="1349" y="657" text-anchor="middle" class="tag">live NPC</text>
    <text x="1471" y="657" text-anchor="middle" class="tag">fold</text>

    <rect x="1088" y="694" width="420" height="40" rx="14" fill="#eff3f2" stroke="#c6cecb" stroke-width="2"/>
    <text x="1298" y="720" text-anchor="middle" class="code">save / transition / samosbor -> foldBack()</text>

    <text x="800" y="832" text-anchor="middle" class="caption">A-Life хранит identity и последствия, а не просто рендерит NPC рядом с игроком.</text>
  </g>
</svg>
