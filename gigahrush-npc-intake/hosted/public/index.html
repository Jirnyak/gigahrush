<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ГИГАХРУЩ NPC intake</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111313;
        --panel: #1c2020;
        --line: #4b5551;
        --text: #e6e0d0;
        --muted: #9ba095;
        --accent: #d0b35d;
        --danger: #d46a57;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      }
      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
        gap: 20px;
      }
      h1, h2 { margin: 0 0 12px; font-size: 20px; letter-spacing: 0; }
      section {
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 16px;
      }
      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      label { display: grid; gap: 6px; color: var(--muted); font-size: 12px; }
      input, textarea, button {
        width: 100%;
        border: 1px solid var(--line);
        background: #0f1111;
        color: var(--text);
        padding: 9px 10px;
        font: inherit;
      }
      textarea { min-height: 78px; resize: vertical; }
      .wide { grid-column: 1 / -1; }
      .check { display: flex; align-items: center; gap: 10px; color: var(--text); }
      .check input { width: auto; }
      button {
        background: #2f352f;
        color: var(--accent);
        border-color: var(--accent);
        cursor: pointer;
      }
      button:disabled { color: var(--muted); border-color: var(--line); cursor: wait; }
      .preview {
        min-height: 420px;
        display: grid;
        align-content: start;
        gap: 12px;
      }
      .demos-head {
        border-bottom: 1px solid var(--line);
        padding-bottom: 10px;
      }
      .demos-name { font-size: 22px; color: var(--accent); }
      .row { display: flex; justify-content: space-between; gap: 16px; color: var(--muted); }
      .speech {
        border-left: 3px solid var(--accent);
        padding-left: 10px;
        line-height: 1.45;
      }
      .error { color: var(--danger); }
      @media (max-width: 820px) {
        main { grid-template-columns: 1fr; }
        form { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Анкета NPC: загрузка пакета</h1>
        <form id="submit-form">
          <label>packageId
            <input name="packageId" pattern="[a-z0-9]+(_[a-z0-9]+)*" required placeholder="slesar_ivanov">
          </label>
          <label>schemaVersion
            <input name="schemaVersion" type="number" min="1" max="99" value="1" required>
          </label>
          <label>Автор для связи
            <input name="authorDisplayName" required>
          </label>
          <label>Приватный контакт
            <input name="authorContactPrivate" required>
          </label>
          <label>Публичный кредит
            <input name="publicCreditName" required>
          </label>
          <label>spriteHash
            <input name="spriteHash" required placeholder="sha256...">
          </label>
          <label class="wide">ZIP пакета
            <input name="packageZip" type="file" accept=".zip,application/zip" required>
          </label>
          <label>source sprite
            <input name="sourceSprite" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
          </label>
          <label>preview PNG
            <input name="previewPng" type="file" accept="image/png">
          </label>
          <label class="wide">Публичная строка Демоса
            <textarea name="publicLine"></textarea>
          </label>
          <label>Этаж/маршрут
            <input name="floorLabel">
          </label>
          <label>Фракция / занятие
            <input name="factionOccupation">
          </label>
          <label class="wide">Пробный пост
            <textarea name="samplePost"></textarea>
          </label>
          <label class="wide">Пробная реплика
            <textarea name="sampleTalk"></textarea>
          </label>
          <label class="check wide">
            <input name="consentAccepted" type="checkbox" required>
            Согласие принято: TENEVIK GAMES может рассмотреть пакет и публично указать выбранный кредит.
          </label>
          <button class="wide" type="submit">Отправить на ревью</button>
          <output id="result" class="wide"></output>
        </form>
      </section>
      <section class="preview" aria-live="polite">
        <h2>Демос-превью</h2>
        <div class="demos-head">
          <div class="demos-name" id="preview-name">Новый житель</div>
          <div class="row"><span id="preview-place">маршрут не выбран</span><span id="preview-role">роль не выбрана</span></div>
        </div>
        <div id="preview-line">Публичная строка появится здесь.</div>
        <div class="speech" id="preview-post">Пост Демоса.</div>
        <div class="speech" id="preview-talk">Реплика в коридоре.</div>
      </section>
    </main>
    <script>
      const form = document.getElementById('submit-form');
      const result = document.getElementById('result');
      const fields = ['publicCreditName', 'floorLabel', 'factionOccupation', 'publicLine', 'samplePost', 'sampleTalk'];

      async function sha256Hex(file) {
        const bytes = await file.arrayBuffer();
        const digest = await crypto.subtle.digest('SHA-256', bytes);
        return [...new Uint8Array(digest)].map(byte => byte.toString(16).padStart(2, '0')).join('');
      }

      function refreshPreview() {
        document.getElementById('preview-name').textContent = form.publicCreditName.value || form.authorDisplayName.value || 'Новый житель';
        document.getElementById('preview-place').textContent = form.floorLabel.value || 'маршрут не выбран';
        document.getElementById('preview-role').textContent = form.factionOccupation.value || 'роль не выбрана';
        document.getElementById('preview-line').textContent = form.publicLine.value || 'Публичная строка появится здесь.';
        document.getElementById('preview-post').textContent = form.samplePost.value || 'Пост Демоса.';
        document.getElementById('preview-talk').textContent = form.sampleTalk.value || 'Реплика в коридоре.';
      }

      for (const name of fields) form[name].addEventListener('input', refreshPreview);
      form.authorDisplayName.addEventListener('input', refreshPreview);

      form.addEventListener('submit', async event => {
        event.preventDefault();
        const button = form.querySelector('button');
        button.disabled = true;
        result.textContent = 'Проверка ZIP...';
        result.className = 'wide';
        try {
          const zip = form.packageZip.files[0];
          const packageHash = await sha256Hex(zip);
          const [faction = '', occupation = ''] = form.factionOccupation.value.split('/').map(part => part.trim());
          const metadata = {
            packageId: form.packageId.value,
            authorDisplayName: form.authorDisplayName.value,
            authorContactPrivate: form.authorContactPrivate.value,
            publicCreditName: form.publicCreditName.value,
            consentAccepted: form.consentAccepted.checked,
            consentAcceptedAt: new Date().toISOString(),
            schemaVersion: Number(form.schemaVersion.value),
            packageHash,
            spriteHash: form.spriteHash.value,
            preview: {
              publicLine: form.publicLine.value,
              floorLabel: form.floorLabel.value,
              faction,
              occupation,
              samplePost: form.samplePost.value,
              sampleTalk: form.sampleTalk.value
            }
          };
          const body = new FormData();
          body.set('metadataJson', JSON.stringify(metadata));
          body.set('packageZip', zip, zip.name);
          if (form.sourceSprite.files[0]) body.set('sourceSprite', form.sourceSprite.files[0], form.sourceSprite.files[0].name);
          if (form.previewPng.files[0]) body.set('previewPng', form.previewPng.files[0], form.previewPng.files[0].name);
          const response = await fetch('/api/submit', { method: 'POST', body });
          const data = await response.json();
          if (!response.ok || !data.ok) throw new Error(data.error || 'submit failed');
          result.textContent = `Принято: ${data.submissionId}`;
        } catch (err) {
          result.textContent = err.message || 'Ошибка отправки';
          result.className = 'wide error';
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
